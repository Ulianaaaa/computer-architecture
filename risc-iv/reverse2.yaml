name: reverse_string_cstr_risciv
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [104, 101, 108, 108, 111, 10]
  0x84: []

reports:
  - name: Step-by-step
    slice: all
    view: |
      T0:{T0} S1:{S1} S2:{S2} S3:{S3}
      {pc}: {instruction} {pc:label}
  
  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      {memory:0:31}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [111,108,108,101,104]
      mem[0..31]: 	6f 6c 6c 65 68 00 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f 5f